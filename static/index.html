<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Analysis Demo Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <style>
        .CodeMirror {
            height: 400px;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 14px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">🔍 Code Analysis Demo Tool</h1>
                    <p class="text-gray-600">Analyze code for dead code, security vulnerabilities, and optimization opportunities</p>
                </div>
                <a href="/static/repo.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    📦 Analyze Repository
                </a>
            </div>
        </div>

        <!-- Input Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Code Input</h2>
            
            <!-- Language Selector -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Language</label>
                <select id="language" class="w-full md:w-64 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="">Auto-detect</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                </select>
            </div>

            <!-- Code Editor -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Code Snippet</label>
                <textarea id="code-input" class="w-full"></textarea>
            </div>

            <!-- Example Buttons -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Load Example:</label>
                <div class="flex flex-wrap gap-2">
                    <button onclick="loadExample('python')" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200">Python Example</button>
                    <button onclick="loadExample('javascript')" class="px-4 py-2 bg-yellow-100 text-yellow-700 rounded-lg hover:bg-yellow-200">JavaScript Example</button>
                    <button onclick="loadExample('java')" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200">Java Example</button>
                </div>
            </div>

            <!-- Analyze Button -->
            <button onclick="analyzeCode()" id="analyze-btn" class="w-full md:w-auto px-8 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                Analyze Code
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex items-center justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <span class="ml-4 text-gray-700">Analyzing code...</span>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results" class="hidden">
            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="text-sm text-gray-600 mb-1">Risk Level</div>
                    <div id="risk-level" class="text-2xl font-bold"></div>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="text-sm text-gray-600 mb-1">Total Issues</div>
                    <div id="total-issues" class="text-2xl font-bold text-gray-800"></div>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="text-sm text-gray-600 mb-1">Lines of Code</div>
                    <div id="loc" class="text-2xl font-bold text-gray-800"></div>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="text-sm text-gray-600 mb-1">Complexity</div>
                    <div id="complexity" class="text-2xl font-bold text-gray-800"></div>
                </div>
            </div>

            <!-- Risk Matrix -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Risk Matrix</h2>
                <div class="relative" style="height: 400px;">
                    <canvas id="risk-chart"></canvas>
                </div>
            </div>

            <!-- Recommendations -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Recommendations</h2>
                <ul id="recommendations" class="space-y-2"></ul>
            </div>

            <!-- Findings Tabs -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="border-b border-gray-200 mb-4">
                    <nav class="flex space-x-4">
                        <button onclick="showTab('security')" id="tab-security" class="tab-btn px-4 py-2 font-medium text-gray-600 hover:text-gray-800 border-b-2 border-transparent">
                            Security Issues <span id="count-security" class="ml-1 px-2 py-1 text-xs bg-red-100 text-red-700 rounded-full">0</span>
                        </button>
                        <button onclick="showTab('dead-code')" id="tab-dead-code" class="tab-btn px-4 py-2 font-medium text-gray-600 hover:text-gray-800 border-b-2 border-transparent">
                            Dead Code <span id="count-dead-code" class="ml-1 px-2 py-1 text-xs bg-orange-100 text-orange-700 rounded-full">0</span>
                        </button>
                        <button onclick="showTab('optimization')" id="tab-optimization" class="tab-btn px-4 py-2 font-medium text-gray-600 hover:text-gray-800 border-b-2 border-transparent">
                            Optimizations <span id="count-optimization" class="ml-1 px-2 py-1 text-xs bg-yellow-100 text-yellow-700 rounded-full">0</span>
                        </button>
                    </nav>
                </div>

                <div id="findings-security" class="findings-tab hidden"></div>
                <div id="findings-dead-code" class="findings-tab hidden"></div>
                <div id="findings-optimization" class="findings-tab hidden"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
